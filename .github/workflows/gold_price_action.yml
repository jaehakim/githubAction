name: Gold Price Capture to Discord

on:
  schedule:
    - cron: '0 0 * * *'   # 09:00 KST
    - cron: '0 3 * * *'   # 12:00 KST
    - cron: '0 6 * * *'   # 15:00 KST
    - cron: '0 9 * * *'   # 18:00 KST
  workflow_dispatch:       # 수동 실행 버튼

jobs:
  run-gold-price:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # 한글 깨짐 방지 (필수!)
      - name: Install Korean Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Libraries
        run: pip install selenium webdriver-manager requests

      - name: Run Gold Price Script
        env:
          DISCORD_GOLD_PRICE_WEBHOOK_URL: ${{ secrets.DISCORD_GOLD_PRICE_WEBHOOK_URL }}
        run: python gold_price.py
