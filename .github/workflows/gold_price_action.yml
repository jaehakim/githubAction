name: Gold Price Capture to Discord

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 아침 9시 (KST = UTC+9)
    - cron: '0 9 * * *'  # 매일 저녁 18시 (KST)
  workflow_dispatch:       # 수동 실행 버튼

jobs:
  run-gold-price:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # 한글 깨짐 방지 (필수!)
      - name: Install Korean Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Libraries
        run: pip install selenium webdriver-manager requests

      - name: Run Gold Price Script
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python gold_price.py
